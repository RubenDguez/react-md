pre-commit:
  commands:
    branch:
      run: bun run branch.mjs
      
    prettier:
      glob: '*.{js,ts,jsx,tsx,mjs,cjs}'
      run: bun prettier {staged_files} --write
      stage_fixed: true

    lint:
      glob: '*.{js,ts,jsx,tsx,mjs,cjs}'
      run: bunx lint {staged_files} --fix
      stage_fixed: true
