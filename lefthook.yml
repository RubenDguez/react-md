pre-push:
  parallel: true
  jobs:
    - name: Branch Name Check
      run: node branch.mjs

pre-commit:
  parallel: true

  jobs:
    - name: Branch Name Check
      run: node branch.mjs

    - name: prettier
      glob: '*.{js,ts,jsx,tsx,mjs,cjs}'
      run: bunx prettier {staged_files} --write
      stage_fixed: true

    - name: Linter
      glob: '*.{js,ts,jsx,tsx,mjs,cjs}'
      run: bun lint {staged_files} --fix
      stage_fixed: true
