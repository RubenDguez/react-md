name: CICD

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
      - feature/*
      - hotfix/*
      - bugfix/*
      - enhancement/*

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm install -g bun
      - run: bun install
      - run: bun vitest run
